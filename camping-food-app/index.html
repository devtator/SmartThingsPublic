<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campfire Kitchen — Camp Food Ordering &amp; Pickup</title>
<style>
  :root {
    --pine: #2f5d3a;
    --pine-dark: #234730;
    --cream: #fdf6ec;
    --card: #ffffff;
    --ember: #e2703a;
    --ember-dark: #c85a28;
    --sun: #f2b134;
    --ink: #2c2a26;
    --ink-soft: #6b675f;
    --line: #e8dfd2;
    --ok: #3a7d44;
    --ok-bg: #e4f2e6;
    --pend: #b07d2b;
    --pend-bg: #fdf0d5;
    --radius: 14px;
    --shadow: 0 2px 10px rgba(44, 42, 38, 0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Avenir Next", "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, var(--pine-dark), var(--pine));
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  header .logo { font-size: 1.9rem; }
  header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.3px; }
  header .tagline { font-size: 0.78rem; opacity: 0.85; }
  .spacer { flex: 1; }
  .role-toggle {
    display: flex;
    background: rgba(255,255,255,0.15);
    border-radius: 999px;
    padding: 4px;
    gap: 4px;
  }
  .role-toggle button {
    border: none;
    background: transparent;
    color: #fff;
    padding: 7px 16px;
    border-radius: 999px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .role-toggle button.active { background: var(--sun); color: var(--ink); }
  .bell {
    position: relative;
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    font-size: 1.15rem;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
  }
  .sync-pill {
    font-size: 0.72rem;
    font-weight: 700;
    background: rgba(255,255,255,0.15);
    border-radius: 999px;
    padding: 5px 11px;
    white-space: nowrap;
  }
  .sync-pill.offline { background: rgba(226, 112, 58, 0.55); }
  .bell .badge {
    position: absolute;
    top: -4px;
    right: -4px;
    background: var(--ember);
    color: #fff;
    font-size: 0.68rem;
    font-weight: 700;
    min-width: 18px;
    height: 18px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
  }
  main { max-width: 980px; margin: 0 auto; padding: 22px 18px 70px; }
  .section-title {
    font-size: 1.05rem;
    font-weight: 700;
    margin: 26px 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title:first-child { margin-top: 4px; }
  .hint { font-size: 0.82rem; color: var(--ink-soft); margin: -6px 0 14px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .card.unavailable { opacity: 0.55; }
  .meal-head { display: flex; align-items: flex-start; gap: 10px; }
  .meal-emoji { font-size: 1.9rem; line-height: 1; }
  .meal-name { font-weight: 700; font-size: 1rem; }
  .meal-cat { font-size: 0.72rem; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.6px; }
  .meal-desc { font-size: 0.86rem; color: var(--ink-soft); line-height: 1.45; }
  .meal-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
  .price { font-weight: 700; color: var(--pine); }
  .chip {
    font-size: 0.74rem;
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px 9px;
    color: var(--ink-soft);
  }
  .chip.slot { background: #eef4ee; border-color: #cfe0d2; color: var(--pine-dark); }
  .btn {
    border: none;
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: filter 0.12s;
  }
  .btn:hover { filter: brightness(0.95); }
  .btn.primary { background: var(--ember); color: #fff; }
  .btn.green { background: var(--pine); color: #fff; }
  .btn.ghost { background: transparent; border: 1.5px solid var(--line); color: var(--ink-soft); }
  .btn.small { padding: 6px 12px; font-size: 0.8rem; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .status {
    font-size: 0.74rem;
    font-weight: 700;
    border-radius: 999px;
    padding: 3px 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .status.pending { background: var(--pend-bg); color: var(--pend); }
  .status.confirmed { background: var(--ok-bg); color: var(--ok); }
  .status.served { background: #ece7f4; color: #6a4fa3; }
  .meal-photo {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
    border: 1px solid var(--line);
  }
  .stars { color: var(--sun); letter-spacing: 2px; font-size: 0.95rem; }
  .star-picker { display: flex; gap: 2px; }
  .star-picker button {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.7rem;
    line-height: 1;
    color: #ddd3c2;
    padding: 2px;
    transition: transform 0.1s;
  }
  .star-picker button.lit { color: var(--sun); }
  .star-picker button:hover { transform: scale(1.15); }
  .review-line {
    padding: 10px 0;
    border-top: 1px dashed var(--line);
    font-size: 0.88rem;
  }
  .review-line:first-of-type { border-top: none; }
  .review-line .quote { color: var(--ink-soft); font-style: italic; margin-top: 3px; }
  .photo-preview-wrap { display: flex; align-items: flex-start; gap: 10px; }
  .photo-preview-wrap .meal-photo { height: 90px; width: 140px; }
  .login-wrap { max-width: 420px; margin: 7vh auto 0; }
  .login-emoji { font-size: 2.4rem; text-align: center; }
  .login-wrap h2 { text-align: center; font-size: 1.2rem; }
  .login-wrap .hint { text-align: center; margin: 0; }
  .code-input {
    text-align: center;
    font-size: 1.5rem;
    letter-spacing: 8px;
    font-weight: 700;
  }
  .emoji-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .emoji-picker button {
    font-size: 1.35rem;
    line-height: 1;
    background: var(--cream);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 6px 8px;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .emoji-picker button:hover { transform: scale(1.12); }
  .emoji-picker button.selected {
    border-color: var(--pine);
    background: #eef4ee;
    box-shadow: 0 0 0 1.5px var(--pine);
  }
  .method-toggle {
    display: flex;
    align-self: center;
    background: var(--cream);
    border: 1.5px solid var(--line);
    border-radius: 999px;
    padding: 4px;
    gap: 4px;
  }
  .method-toggle button {
    border: none;
    background: transparent;
    color: var(--ink-soft);
    padding: 7px 18px;
    border-radius: 999px;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
  }
  .method-toggle button.active { background: var(--sun); color: var(--ink); }
  .link-btn {
    background: none;
    border: none;
    color: var(--pine);
    font-weight: 700;
    cursor: pointer;
    font-size: 0.8rem;
    text-decoration: underline;
    padding: 0;
  }
  .account-line {
    font-size: 0.78rem;
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .field label { font-size: 0.8rem; font-weight: 700; color: var(--ink-soft); }
  input[type="text"], input[type="number"], select, textarea {
    font: inherit;
    padding: 9px 11px;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    background: #fff;
    width: 100%;
  }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--sun); border-color: var(--sun); }
  .slot-picker { display: flex; flex-wrap: wrap; gap: 8px; }
  .slot-picker button {
    border: 1.5px solid var(--line);
    background: #fff;
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
  }
  .slot-picker button.selected { background: var(--pine); border-color: var(--pine); color: #fff; }
  .tally { display: flex; flex-direction: column; gap: 6px; margin: 8px 0; }
  .tally-row { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
  .tally-row .t-slot { width: 74px; font-weight: 600; }
  .tally-row .t-bar { height: 10px; background: var(--sun); border-radius: 999px; min-width: 4px; }
  .tally-row .t-count { color: var(--ink-soft); font-size: 0.78rem; }
  .order-line {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    border-top: 1px dashed var(--line);
    font-size: 0.88rem;
    flex-wrap: wrap;
  }
  .order-line:first-of-type { border-top: none; }
  .order-line .who { font-weight: 700; }
  .order-line .pref { color: var(--ink-soft); }
  .notif {
    background: var(--card);
    border: 1px solid var(--line);
    border-left: 5px solid var(--sun);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    font-size: 0.88rem;
    box-shadow: var(--shadow);
  }
  .notif.unread { border-left-color: var(--ember); background: #fff8f2; }
  .notif .when { display: block; font-size: 0.72rem; color: var(--ink-soft); margin-top: 4px; }
  .empty {
    text-align: center;
    color: var(--ink-soft);
    font-size: 0.9rem;
    padding: 26px 10px;
    background: var(--card);
    border: 1.5px dashed var(--line);
    border-radius: var(--radius);
  }
  dialog {
    border: none;
    border-radius: var(--radius);
    box-shadow: 0 10px 40px rgba(0,0,0,0.25);
    padding: 22px;
    width: min(440px, 92vw);
  }
  dialog::backdrop { background: rgba(35, 71, 48, 0.45); }
  dialog h3 { margin-bottom: 4px; }
  dialog .sub { font-size: 0.84rem; color: var(--ink-soft); margin-bottom: 14px; }
  .toast {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--pine-dark);
    color: #fff;
    padding: 12px 20px;
    border-radius: 999px;
    font-size: 0.88rem;
    font-weight: 600;
    box-shadow: 0 4px 18px rgba(0,0,0,0.3);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 100;
    max-width: 90vw;
    text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }
  .footer-tools { text-align: center; margin-top: 40px; }
  .name-bar {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .name-bar input { max-width: 200px; }
  .name-bar .label { font-size: 0.86rem; font-weight: 700; }
  .site-bar {
    background: #eef4ee;
    border: 1px solid #cfe0d2;
    border-radius: var(--radius);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .site-bar .site-name { font-weight: 700; color: var(--pine-dark); }
  .site-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-top: 1px dashed var(--line);
    flex-wrap: wrap;
  }
  .site-row:first-of-type { border-top: none; }
  .site-row .s-emoji { font-size: 1.6rem; }
  .site-row .s-name { font-weight: 700; }
  .site-row .s-meta { font-size: 0.78rem; color: var(--ink-soft); }
  .invite-link-box {
    font-family: ui-monospace, monospace;
    font-size: 0.78rem;
    background: var(--cream);
    border: 1.5px dashed var(--line);
    border-radius: 10px;
    padding: 10px;
    word-break: break-all;
  }
  .toggle-avail { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: var(--ink-soft); cursor: pointer; }
  @media (max-width: 560px) {
    header h1 { font-size: 1.05rem; }
    header .tagline { display: none; }
  }
</style>
</head>
<body>

<header>
  <span class="logo">🏕️</span>
  <div>
    <h1>Campfire Kitchen</h1>
    <div class="tagline">Order breakfast from the camp chef · pick up hot at the fire</div>
  </div>
  <div class="spacer"></div>
  <span class="sync-pill" id="syncPill" title="Storage mode"></span>
  <button class="bell" id="bellBtn" title="Notifications">🔔<span class="badge" id="bellBadge" hidden>0</span></button>
  <div class="role-toggle" role="tablist" aria-label="Choose view">
    <button id="roleChef" role="tab">👨‍🍳 Chef</button>
    <button id="roleCamper" role="tab">🎒 Camper</button>
  </div>
</header>

<main id="app"></main>

<dialog id="orderDialog"></dialog>
<dialog id="mealDialog"></dialog>
<dialog id="rateDialog"></dialog>
<dialog id="siteDialog"></dialog>
<dialog id="inviteDialog"></dialog>
<dialog id="accountDialog"></dialog>
<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script>
"use strict";

/* ---------------------------------------------------------------
 * Campfire Kitchen — camp food ordering & pickup for a home chef
 *
 * Roles:
 *  - Chef: sets the meals (what's available) and the time slots
 *    they're willing to cook, then reviews incoming orders and
 *    confirms ONE pickup time per meal. Confirming notifies every
 *    camper who ordered that meal.
 *  - Camper: browses available meals, places an order with their
 *    preferred pickup time, and gets notified when the chef locks
 *    in the actual time.
 *
 * After the meal, the chef marks it served — every camper who
 * picked it up gets a notification asking them to rate the meal
 * and send the chef a compliment, which lands on the chef's
 * kudos board.
 *
 * Storage modes (see config.js):
 *  - Device-only demo (default): shared state lives in this
 *    browser's localStorage. Great for trying the app, but each
 *    device sees its own copy. No sign-in.
 *  - Live sync: with supabaseUrl + supabaseAnonKey configured,
 *    meals/orders/notifications live in one shared Supabase row
 *    so every phone sees the same data. Writes use optimistic
 *    concurrency (a version column) and the app polls for
 *    changes every few seconds.
 *
 * Sign-in (live-sync mode only): users authenticate with their
 * cell number via Supabase Auth SMS OTP — enter phone, get a
 * texted code, verify. The verified phone becomes the user's
 * identity (orders and notifications key off it), the session is
 * kept in localStorage and refreshed automatically, and the
 * database only accepts reads/writes from signed-in users.
 * Per-device things (which view you're in, your display name)
 * always stay local.
 * ------------------------------------------------------------- */

const STORE_KEY = "campfire-kitchen-v3";

// Icon libraries for the pickers: common breakfast fare for meals,
// outdoorsy scenes for camp sites. A free-text field stays available
// for anything not covered.
const MEAL_EMOJIS = [
  "🍳", "🥓", "🥞", "🧇", "🥐", "🥯", "🍞", "🥖", "🫓",
  "🥪", "🌯", "🌮", "🫔", "🥙", "🍔", "🌭", "🍗",
  "🥔", "🧀", "🥚", "🥣", "🥗", "🥑", "🍲",
  "🍩", "🧁", "🍪", "🍎", "🍌", "🍓", "🫐", "🍊", "🍉",
  "☕", "🍵", "🥛", "🧃", "🥤", "🍯",
];
const SITE_EMOJIS = ["🏕️", "⛺", "🏞️", "🌲", "🌄", "🌅", "🔥", "🏔️", "🛶", "🎣", "🥾", "🌌"];
const PREFS_KEY = "campfire-kitchen-prefs-v1";
const CFG = window.CAMPFIRE_CONFIG || {};
const REMOTE = !!(CFG.supabaseUrl && CFG.supabaseAnonKey);
const ALL_SLOTS = ["7:00 AM", "7:30 AM", "8:00 AM", "8:30 AM", "9:00 AM", "9:30 AM"];

/* ---------- Sample data set: summertime camp breakfast ---------- */
function seedData() {
  const meals = [
    {
      id: "m1", emoji: "🥓", name: "Eggs & Bacon Breakfast Sandwich",
      category: "Sandwich",
      desc: "Two fried eggs, crispy campfire bacon, and melted cheddar on a griddle-toasted brioche bun.",
      price: 8.0, available: true, photo: null,
      slots: ["7:00 AM", "7:30 AM", "8:00 AM", "8:30 AM"],
      // Camper-configurable options: "one" = choose exactly one
      // (first choice preselected), "any" = check as many as you like.
      optionGroups: [
        { name: "Bread", type: "one", choices: ["Bagel", "Wrap", "Toast"] },
        { name: "Add-ons", type: "any", choices: ["Cheese", "Bacon", "Hash browns"] },
        { name: "Side", type: "any", choices: ["Bacon", "Hash browns"] },
      ],
    },
    {
      id: "m2", emoji: "🥐", name: "Sausage, Egg & Cheese Croissant",
      category: "Sandwich",
      desc: "Maple breakfast sausage, folded egg, and American cheese tucked into a warm, flaky croissant.",
      price: 8.5, available: true, photo: null,
      slots: ["7:30 AM", "8:00 AM", "8:30 AM"],
    },
    {
      id: "m3", emoji: "🥯", name: "Smoked Ham & Egg Bagel",
      category: "Sandwich",
      desc: "Fire-toasted everything bagel with smoked ham, over-medium egg, Swiss, and a swipe of honey mustard.",
      price: 8.0, available: true, photo: null,
      slots: ["8:00 AM", "8:30 AM", "9:00 AM"],
    },
    {
      id: "m4", emoji: "🍳", name: "Campfire Breakfast Bowl",
      category: "Bowl",
      desc: "Scrambled eggs over crispy skillet potatoes with bacon crumbles, cheddar, and fire-roasted salsa.",
      price: 9.5, available: true, photo: null,
      slots: ["7:00 AM", "7:30 AM", "8:00 AM", "8:30 AM", "9:00 AM"],
      optionGroups: [
        { name: "Salsa", type: "one", choices: ["Mild", "Fire-roasted hot"] },
        { name: "Extras", type: "any", choices: ["Avocado", "Extra cheese"] },
      ],
    },
    {
      id: "m5", emoji: "🥑", name: "Veggie Sunrise Bowl",
      category: "Bowl",
      desc: "Soft-scrambled eggs, black beans, charred peppers and onions, avocado, and cotija over hash browns.",
      price: 9.0, available: true, photo: null,
      slots: ["7:30 AM", "8:00 AM", "8:30 AM", "9:00 AM", "9:30 AM"],
    },
    {
      id: "m6", emoji: "🥞", name: "Pancake Stack & Bacon Plate",
      category: "Plate",
      desc: "Three buttermilk griddle cakes with maple syrup, whipped butter, and two strips of thick-cut bacon.",
      price: 9.0, available: false, photo: null,
      slots: ["8:30 AM", "9:00 AM", "9:30 AM"],
    },
  ];

  // Demo orders use the camper's name as camperId; real signed-in
  // users get their verified phone number instead.
  const orders = [
    { id: "o1", mealId: "m1", camper: "Riley",  camperId: "Riley",  qty: 2, preferred: "7:30 AM", notes: "Extra crispy bacon please!", status: "pending",   confirmedSlot: null,      review: null,
      options: { "Bread": ["Bagel"], "Add-ons": ["Cheese", "Bacon"], "Side": ["Hash browns"] } },
    { id: "o2", mealId: "m1", camper: "Sam",    camperId: "Sam",    qty: 1, preferred: "7:30 AM", notes: "",                            status: "pending",   confirmedSlot: null,      review: null },
    { id: "o3", mealId: "m1", camper: "Dana",   camperId: "Dana",   qty: 1, preferred: "8:00 AM", notes: "No cheese",                   status: "pending",   confirmedSlot: null,      review: null },
    { id: "o4", mealId: "m4", camper: "Alex",   camperId: "Alex",   qty: 1, preferred: "8:00 AM", notes: "Salsa on the side",           status: "pending",   confirmedSlot: null,      review: null,
      options: { "Salsa": ["Mild"], "Extras": ["Avocado"] } },
    { id: "o5", mealId: "m4", camper: "Jordan", camperId: "Jordan", qty: 2, preferred: "8:30 AM", notes: "",                            status: "pending",   confirmedSlot: null,      review: null },
    { id: "o6", mealId: "m5", camper: "Morgan", camperId: "Morgan", qty: 1, preferred: "9:00 AM", notes: "Extra avocado",               status: "served",    confirmedSlot: "9:00 AM", review: null },
  ];

  // Yesterday's service, already archived: history keeps a snapshot
  // of each order (meal name/emoji/price copied in, so later menu
  // edits can't rewrite the past) plus servings and revenue totals.
  const history = [
    {
      id: "h1", label: "Yesterday", archivedAt: "Yesterday 10:30 AM",
      orders: [
        { id: "o7", mealId: "m6", camper: "Dana", camperId: "Dana", qty: 1, preferred: "8:30 AM", notes: "",
          status: "served", confirmedSlot: "8:30 AM",

// The directory (row 0 in live sync) lists every camp site. Site 1

/* ------------------------- persistence -------------------------
 * `state`  — the SHARED data (meals, orders, notifications).
 * `prefs`  — per-device data (current view, camper name); always
 *            stored locally, never synced.
 * All shared mutations go through commit(mutator). In device-only
 * mode the mutator runs and saves locally. In live-sync mode the
 * write is pushed with a version check; on conflict the latest
 * state is fetched and the mutator re-applied (so mutators must
 * be safe to re-run).
 * -------------------------------------------------------------- */
let state = null;
let stateVersion = 0; // remote row version (live-sync mode)
const DIR_ID = 0;     // the camp-site directory lives in row 0
let directory = null;
let dirVersion = 0;
let prefs = loadPrefs();

function loadPrefs() {
  let p = null;
  try {
    const raw = localStorage.getItem(PREFS_KEY);
    if (raw) p = JSON.parse(raw);
  } catch (e) { /* fall through */ }
  // In live-sync mode campers must type their real name first.
  if (!p) p = { role: "camper", camperName: REMOTE ? "" : "Riley" };
  if (!p.siteId) p.siteId = 1;
  // An invite link (?site=N) drops the user straight into that camp site.
  const urlSite = parseInt(new URLSearchParams(location.search).get("site"), 10);
  if (urlSite > 0) p.siteId = urlSite;
  return p;
}

function currentSite() {
  return directory && directory.sites.find((s) => s.id === prefs.siteId) || null;
}
function savePrefs() {
  try { localStorage.setItem(PREFS_KEY, JSON.stringify(prefs)); } catch (e) { /* non-fatal */ }
}

function loadLocal() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (s && s.meals) {
        delete s.role; delete s.camperName; // migrate pre-prefs blobs
        return s;
      }
    }
  } catch (e) { /* corrupted store — fall through to seed */ }
  return seedData();
}
function saveLocal() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
  } catch (e) {
    // localStorage quota exceeded — most likely too many photos
    toast("⚠️ Local storage is full — try removing a meal photo");
  }
}

/* --- sign-in (Supabase Auth: SMS codes or email magic links) ----- */
const AUTH_KEY = "campfire-kitchen-auth-v1";
const AUTH_URL = REMOTE ? `${CFG.supabaseUrl.replace(/\/$/, "")}/auth/v1` : null;
let session = loadSession();

// A sign-in is good for 7 days on a device: access tokens refresh
// automatically in the background, and after a week the app asks
// for a fresh code/link.
const SESSION_MAX_MS = 7 * 24 * 60 * 60 * 1000;

function loadSession() {
  try {
    const raw = localStorage.getItem(AUTH_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (s && !s.signedInAt) s.signedInAt = Date.now(); // migrate older sessions
      return s;
    }
  } catch (e) { /* fall through */ }
  return null;
}
function saveSession() {
  try {
    if (session) localStorage.setItem(AUTH_KEY, JSON.stringify(session));
    else localStorage.removeItem(AUTH_KEY);
  } catch (e) { /* non-fatal */ }
}

// The signed-in user's identities: verified phone and/or email in
// live-sync mode (a user needs only one, may link both), or the
// typed display name in device-only demo mode. Orders and
// notifications match against ANY of them.
function myIds() {
  if (!REMOTE || !session) return [prefs.camperName];
  const ids = [];
  if (session.user.phone) ids.push("+" + String(session.user.phone).replace(/^\+/, ""));
  if (session.user.email) ids.push(String(session.user.email).toLowerCase());
  return ids;
}
function myId() { return myIds()[0] || ""; }
function myIdLabel() {
  const id = myId();
  if (id.startsWith("+") && id.length > 4) return id.slice(0, -4).replace(/\d/g, "•") + id.slice(-4);
  return id;
}

async function authPost(path, body) {
  let res;
  try {
    res = await fetch(`${AUTH_URL}${path}`, {
      method: "POST",
      headers: { apikey: CFG.supabaseAnonKey, "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
  } catch (err) {
    // couldn't reach the server at all — distinct from a rejection
    const e = new Error("Can't reach the sign-in server — check your connection");
    e.networkError = true;
    throw e;
  }
  const json = await res.json().catch(() => ({}));
  if (!res.ok) {
    throw new Error(json.msg || json.error_description || json.message || `sign-in error (${res.status})`);
  }
  return json;
}

function adoptSession(s) {
  session = {
    access_token: s.access_token,
    refresh_token: s.refresh_token,
    expires_at: Math.floor(Date.now() / 1000) + (s.expires_in || 3600),
    // token refreshes keep the original sign-in date; fresh sign-ins
    // (session was null) start the 7-day clock now
    signedInAt: (session && session.signedInAt) || Date.now(),
    user: { id: s.user.id, phone: s.user.phone || null, email: s.user.email || null },
  };
  saveSession();
}

async function fetchAuthUser(accessToken) {
  const res = await fetch(`${AUTH_URL}/user`, {
    headers: { apikey: CFG.supabaseAnonKey, Authorization: `Bearer ${accessToken}` },
  });
  if (!res.ok) throw new Error(`user ${res.status}`);
  return res.json();
}

// Magic-link return trip: Supabase redirects back with the session
// in the URL hash. Consume (and scrub) it if present.
function consumeAuthHash() {
  if (!location.hash || location.hash.length < 2) return null;
  const p = new URLSearchParams(location.hash.slice(1));
  const scrub = () => history.replaceState(null, "", location.pathname + location.search);
  if (p.get("error_description")) {
    scrub();
    return { error: p.get("error_description").replace(/\+/g, " ") };
  }
  if (!p.get("access_token")) return null;
  const tokens = {
    access_token: p.get("access_token"),
    refresh_token: p.get("refresh_token"),
    expires_in: parseInt(p.get("expires_in"), 10) || 3600,
  };
  scrub();
  return { tokens };
}

// "5551234567" / "555-123-4567" → "+15551234567" (assumes US when
// no country code is given).
function normalizePhone(raw) {
  const p = String(raw).replace(/[^\d+]/g, "");
  if (p.startsWith("+")) return p;
  if (p.length === 10) return "+1" + p;
  if (p.length === 11 && p.startsWith("1")) return "+" + p;
  return "+" + p;
}

async function requestOtp(phone) {
  await authPost("/otp", { phone, create_user: true });
}
async function verifyOtp(phone, token) {
  adoptSession(await authPost("/verify", { phone, token, type: "sms" }));
}
async function requestMagicLink(email) {
  const redirect = encodeURIComponent(location.href.split(/[?#]/)[0]);
  await authPost(`/otp?redirect_to=${redirect}`, { email, create_user: true });
}

// Link the missing identifier (email or phone) to the signed-in account.
async function authUpdateUser(fields) {
  const res = await fetch(`${AUTH_URL}/user`, {
    method: "PUT",
    headers: {
      apikey: CFG.supabaseAnonKey,
      Authorization: `Bearer ${session.access_token}`,
      "Content-Type": "application/json",
    },
    body: JSON.stringify(fields),
  });
  const j = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(j.msg || j.error_description || j.message || `account error (${res.status})`);
  return j;
}

async function refreshSessionUser() {
  try {
    const u = await fetchAuthUser(session.access_token);
    session.user = { id: u.id, phone: u.phone || null, email: u.email || null };
    saveSession();
  } catch (e) { /* non-fatal */ }
}

// True if we hold a session that is (or could be refreshed to be) valid.
async function ensureSession() {
  if (!session) return false;
  // Hard cap: a week after signing in, verify again.
  if (Date.now() - (session.signedInAt || 0) > SESSION_MAX_MS) {
    session = null;
    saveSession();
    return false;
  }
  if (session.expires_at - Math.floor(Date.now() / 1000) > 60) return true;
  try {
    adoptSession(await authPost("/token?grant_type=refresh_token", { refresh_token: session.refresh_token }));
    return true;
  } catch (e) {
    if (e.networkError) return true; // transient outage — keep the session, retry later
    session = null;
    saveSession();
    return false;
  }
}

function signOut() {
  session = null;
  saveSession();
  location.reload();
}

/* ------------------ live sync (Supabase REST) ------------------ */
const SB_URL = REMOTE ? `${CFG.supabaseUrl.replace(/\/$/, "")}/rest/v1/campfire_state` : null;
function sbHeaders() {
  return {
    apikey: CFG.supabaseAnonKey,
    Authorization: `Bearer ${session ? session.access_token : CFG.supabaseAnonKey}`,
    "Content-Type": "application/json",
  };
}

function setSyncPill(mode) {
  const el = $("#syncPill");
  if (!el) return;
  el.classList.toggle("offline", mode === "offline");
  el.textContent = !REMOTE ? "💾 Device-only demo"
    : mode === "offline" ? "⚠️ Reconnecting…"
    : "🟢 Live sync";
}

async function fetchRows(ids) {
  const res = await fetch(`${SB_URL}?id=in.(${ids.join(",")})&select=id,version,data`, { headers: sbHeaders() });
  if (res.status === 401) throw new Error("unauthorized");
  if (res.status === 404) throw new Error("table-missing"); // supabase-setup.sql not run yet
  if (!res.ok) throw new Error(`fetch ${res.status}`);
  return res.json();
}

/* Writes go through the campfire_write / campfire_seed database
 * functions, which enforce the chef rules SERVER-SIDE: campers can
 * only touch their own orders; only chefs may change menus, the
 * camp-site directory, or other people's orders. If the database is
 * still on the pre-v3 setup script (no functions yet), we fall back
 * to direct writes and nag about upgrading. */
let rpcMode = null;      // null = unknown, true = validated RPCs, false = legacy direct writes
let serverIsChef = null; // null = unknown/legacy, true/false = server verdict

async function rpc(name, args) {
  const res = await fetch(`${CFG.supabaseUrl.replace(/\/$/, "")}/rest/v1/rpc/${name}`, {
    method: "POST",
    headers: sbHeaders(),
    body: JSON.stringify(args || {}),
  });
  if (res.status === 401) throw new Error("unauthorized");
  if (res.status === 404) throw new Error("rpc-missing");
  const j = await res.json().catch(() => null);
  if (!res.ok) throw new Error((j && (j.message || j.hint)) || `rpc ${res.status}`);
  return j;
}

function noteLegacyMode() {
  if (rpcMode === false) return;
  rpcMode = false;
  toast("⚠️ Server-side chef checks aren't active — run the latest supabase-setup.sql");
}

// Update one row, but only if nobody else wrote since we last read
// it. Returns true on success, false on a version conflict.
async function pushRow(id, expectedVersion, data) {
  if (rpcMode !== false) {
    try {
      const v = await rpc("campfire_write", { p_id: id, p_expected_version: expectedVersion, p_data: data });
      rpcMode = true;
      return v > 0; // -1 → version conflict
    } catch (e) {
      if (e.message !== "rpc-missing") throw e;
      noteLegacyMode();
    }
  }
  const res = await fetch(`${SB_URL}?id=eq.${id}&version=eq.${expectedVersion}`, {
    method: "PATCH",
    headers: { ...sbHeaders(), Prefer: "return=representation" },
    body: JSON.stringify({ version: expectedVersion + 1, data }),
  });
  if (res.status === 401) throw new Error("unauthorized");
  if (!res.ok) throw new Error(`push ${res.status}`);
  return (await res.json()).length > 0; // empty → version conflict
}

// Insert a row if it doesn't exist yet; races are harmless.
async function insertRow(id, data) {
  if (rpcMode !== false) {
    try {
      await rpc("campfire_seed", { p_id: id, p_data: data });
      rpcMode = true;
      return;
    } catch (e) {
      if (e.message !== "rpc-missing") throw e;
      noteLegacyMode();
    }
  }
  const res = await fetch(SB_URL, {
    method: "POST",
    headers: { ...sbHeaders(), Prefer: "resolution=ignore-duplicates" },
    body: JSON.stringify({ id, version: 1, data }),
  });
  if (res.status === 401) throw new Error("unauthorized");
}

// Ask the database whether the signed-in phone is a chef.
async function refreshChefStatus() {
  try {
    serverIsChef = (await rpc("campfire_is_chef", {})) === true;
    rpcMode = true;
  } catch (e) {
    if (e.message === "unauthorized") throw e;
    if (e.message === "rpc-missing") noteLegacyMode();
    serverIsChef = null; // unknown → legacy client-side gating applies
  }
}

function adoptDirRow(row) { directory = row.data; dirVersion = row.version; }
function adoptSiteRow(row) { state = row.data; stateVersion = row.version; }

async function remoteInit() {
  let rows = await fetchRows([DIR_ID, prefs.siteId]);
  let dir = rows.find((r) => r.id === DIR_ID);
  if (!dir) {
    // First client ever: create the directory and the demo campground.
    // (Also migrates a pre-directory deployment: the old demo data in
    // row 1 is kept because the insert ignores duplicates.)
    await insertRow(DIR_ID, seedDirectory());
    await insertRow(1, seedData());
    rows = await fetchRows([DIR_ID, prefs.siteId]);
    dir = rows.find((r) => r.id === DIR_ID);
    if (!dir) throw new Error("could not seed shared state");
  }
  adoptDirRow(dir);
  if (!currentSite()) prefs.siteId = directory.sites[0].id; // stale ?site= link
  let site = rows.find((r) => r.id === prefs.siteId);
  if (!site) {
    // Site is in the directory but its row is missing (creation race).
    await insertRow(prefs.siteId, emptySiteData());
    site = (await fetchRows([prefs.siteId]))[0];
    if (!site) throw new Error("could not load camp site");
  }
  adoptSiteRow(site);
}

async function remoteRefresh() {
  const rows = await fetchRows([DIR_ID, prefs.siteId]);
  let changed = false;
  const dir = rows.find((r) => r.id === DIR_ID);
  if (dir && dir.version !== dirVersion) { adoptDirRow(dir); changed = true; }
  const site = rows.find((r) => r.id === prefs.siteId);
  if (site && site.version !== stateVersion) { adoptSiteRow(site); changed = true; }
  return changed;
}

const POLL_MS = 4000;
let pollTimer = null;
function startPolling() {
  if (pollTimer) return;
  pollTimer = setInterval(async () => {
    try {
      if (!(await ensureSession())) { handleAuthLoss(); return; }
      const changed = await remoteRefresh();
      setSyncPill("ok");
      if (changed) render();
    } catch (e) {
      if (e.message === "unauthorized") { handleAuthLoss(); return; }
      setSyncPill("offline");
    }
  }, POLL_MS);
}

function handleAuthLoss() {
  session = null;
  serverIsChef = null;
  saveSession();
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  renderLogin("Your session expired — sign in again to get back to the kitchen.");
}

/* -------- commit: the single write path for shared state -------- */
async function commit(mutator) {
  if (!REMOTE) {
    mutator(state);
    render();
    return true;
  }
  try {
    if (!(await ensureSession())) { handleAuthLoss(); return false; }
    for (let attempt = 0; attempt < 5; attempt++) {
      mutator(state);
      if (await pushRow(prefs.siteId, stateVersion, state)) {
        stateVersion += 1;
        setSyncPill("ok");
        render();
        return true;
      }
      // Someone else wrote first — take their state and re-apply.
      await remoteRefresh();
    }
    toast("⚠️ The camp kitchen is busy — change not saved, please retry");
  } catch (e) {
    if (e.message === "unauthorized") { handleAuthLoss(); return false; }
    if (/only the chef|own orders|sign in required|camp site/.test(e.message)) {
      // the server-side validator refused the write
      await remoteRefresh().catch(() => {}); // discard the local mutation
      toast("⛔ " + e.message);
      render();
      return false;
    }
    setSyncPill("offline");
    toast("⚠️ Can't reach the camp kitchen server — check your connection");
  }
  render();
  return false;
}

/* ---- commitDirectory: same write path for the camp-site list ---- */
async function commitDirectory(mutator) {
  if (!REMOTE) {
    mutator(directory);
    render();
    return true;
  }
  try {
    if (!(await ensureSession())) { handleAuthLoss(); return false; }
    for (let attempt = 0; attempt < 5; attempt++) {
      mutator(directory);
      if (await pushRow(DIR_ID, dirVersion, directory)) {
        dirVersion += 1;
        setSyncPill("ok");
        return true;
      }
      await remoteRefresh();
    }
    toast("⚠️ The camp directory is busy — please retry");
  } catch (e) {
    if (e.message === "unauthorized") { handleAuthLoss(); return false; }
    if (/only the chef|own orders|sign in required|camp site/.test(e.message)) {
      await remoteRefresh().catch(() => {});
      toast("⛔ " + e.message);
      return false;
    }
    setSyncPill("offline");
    toast("⚠️ Can't reach the camp kitchen server — check your connection");
  }
  return false;
}

function uid(prefix) { return prefix + (state.nextId++); }
function nowLabel() {
  return new Date().toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }) + " today";
}

/* --------------------------- helpers --------------------------- */
const $ = (sel) => document.querySelector(sel);
function esc(s) {
  return String(s).replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function money(n) { return "$" + n.toFixed(2); }
function mealById(id) { return state.meals.find((m) => m.id === id); }
function starStr(n) { return "★".repeat(n) + "☆".repeat(5 - n); }
// Today's orders plus every archived one — ratings outlive the day.
function allOrdersEver() {
  return state.orders.concat((state.history || []).flatMap((h) => h.orders || []));
}
function mealReviews(mealId) {

/* ------------------- day cycle & cutoff ------------------------- */
const CUTOFF_CHOICES = ["", "06:00", "06:30", "07:00", "07:30", "08:00", "08:30",
                        "18:00", "19:00", "20:00", "21:00", "22:00"];
function cutoffLabel(v) {
  if (!v) return "No cutoff";
  const [h, mnt] = v.split(":").map(Number);
  return `${((h + 11) % 12) + 1}:${String(mnt).padStart(2, "0")} ${h < 12 ? "AM" : "PM"}`;
}

// True once the first occurrence of the cutoff time after the day
// started has passed on this device's clock.
function pastCutoff() {
  if (!state || !state.cutoffTime || !state.day || !state.day.startedAt) return false;
  const [h, mnt] = state.cutoffTime.split(":").map(Number);
  const c = new Date(state.day.startedAt);
  c.setHours(h, mnt, 0, 0);
  if (c.getTime() < state.day.startedAt) c.setDate(c.getDate() + 1);
  return Date.now() >= c.getTime();
}

function orderingClosed() {
  if (!state) return false;
  if (state.orderingOverride === "closed") return true;
  if (state.orderingOverride === "open") return false;
  return pastCutoff();
}
function ratingChip(mealId) {
  const revs = mealReviews(mealId);
  if (!revs.length) return "";
  const avg = revs.reduce((a, o) => a + o.review.rating, 0) / revs.length;
  return `<span class="chip" title="Camper rating"><span class="stars">★</span> ${avg.toFixed(1)} · ${revs.length} review${revs.length > 1 ? "s" : ""}</span>`;
}
function toast(msg) {
  const t = $("#toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove("show"), 2600);
}
function notify(to, text) {
  state.notifications.unshift({ id: uid("n"), to, unread: true, text, when: nowLabel() });
}
function unreadCount() {
  const mine = prefs.role === "chef" ? ["chef"] : myIds();
  return state.notifications.filter((n) => n.unread && (mine.includes(n.to) || n.to === "all")).length;
}

function chefOrderGroup({ meal, orders }) {
  // Tally preferred times so the chef can see demand at a glance.
  const counts = {};
  for (const o of orders) counts[o.preferred] = (counts[o.preferred] || 0) + o.qty;
  const max = Math.max(...Object.values(counts));
  const slots = meal.slots.filter((s) => counts[s]).concat(
    Object.keys(counts).filter((s) => !meal.slots.includes(s)));
  const totalQty = orders.reduce((a, o) => a + o.qty, 0);

  return `
    <div class="card" style="margin-bottom:16px">
      <div class="meal-head">
        <span class="meal-emoji">${meal.emoji}</span>
        <div>
          <div class="meal-name">${esc(meal.name)}</div>
          <div class="meal-cat">${orders.length} order${orders.length > 1 ? "s" : ""} · ${totalQty} serving${totalQty > 1 ? "s" : ""}</div>
        </div>
      </div>

      ${orders.map((o) => `
        <div class="order-line">
          <span class="who">${esc(o.camper)}</span>
          <span>${o.qty}×</span>
          <span class="pref">prefers ${o.preferred}</span>
          ${Object.entries(o.options || {}).map(([g, cs]) =>
            `<span class="chip">${esc(g)}: ${esc(cs.join(", "))}</span>`).join("")}
          ${o.notes ? `<span class="chip">📝 ${esc(o.notes)}</span>` : ""}
        </div>
      `).join("")}

      <div class="tally">
        ${slots.map((s) => `
          <div class="tally-row">
            <span class="t-slot">${s}</span>
            <span class="t-bar" style="width:${(counts[s] / max) * 140}px"></span>
            <span class="t-count">${counts[s]} serving${counts[s] > 1 ? "s" : ""} preferred</span>
          </div>
        `).join("")}
      </div>

      <div class="row">
        <select id="confirm-${meal.id}">
          ${meal.slots.map((s) => `<option value="${s}" ${counts[s] === max ? "selected" : ""}>${s}${counts[s] ? ` (${counts[s]} preferred)` : ""}</option>`).join("")}
        </select>
        <button class="btn green" onclick="confirmMealTime('${meal.id}')">Confirm time &amp; notify campers</button>
      </div>
    </div>
  `;
}

function notifList(list) {
  if (!list.length) return `<div class="empty">Nothing yet.</div>`;
  return list.map((n) => `
    <div class="notif ${n.unread ? "unread" : ""}">
      ${esc(n.text)}
      <span class="when">${esc(n.when)}</span>
    </div>
  `).join("");
}

/* --------------------------- actions ---------------------------
 * Mutators passed to commit() may re-run on a fresher copy of the
 * shared state after a sync conflict, so they always look items up
 * by id inside the mutator. */
function setRole(role) {
  if (!state) return; // still on the sign-in screen
  if (role === "chef") {
    if (REMOTE && session && serverIsChef !== null) {
      // The database's verdict (campfire_chefs table) is authoritative
      // — and the server refuses chef-only writes regardless.
      if (!serverIsChef) {
        toast("Only the chef's phone can open the kitchen 👩‍🍳");
        return;
      }
    } else if (REMOTE && session && (CFG.chefPhones || []).length) {
      // Legacy fallback (pre-v4 database): client-side list of chef
      // phones and/or emails.
      const chefIds = (CFG.chefPhones || []).map((c) =>
        c.includes("@") ? c.trim().toLowerCase() : normalizePhone(c));
      if (!myIds().some((id) => chefIds.includes(id))) {
        toast("Only the chef's phone can open the kitchen 👩‍🍳");
        return;
      }
    } else if (CFG.chefPin && sessionStorage.getItem("campfire-chef-ok") !== "1") {
      const pin = prompt("Chef PIN:");
      if (pin !== String(CFG.chefPin)) {
        if (pin !== null) toast("Wrong PIN — ask the chef!");
        return;
      }
      sessionStorage.setItem("campfire-chef-ok", "1");
    }
  }
  prefs.role = role;
  render();
}

function toggleAvail(id) {
  let onMenu;
  commit((s) => {
    const m = s.meals.find((x) => x.id === id);
    if (!m) return;
    m.available = !m.available;
    onMenu = m.available;
  }).then((ok) => {
    if (!ok || onMenu === undefined) return;
    const m = mealById(id);
    toast(onMenu ? `${m.name} is back on the menu` : `${m.name} removed from the menu`);
  });
}

function cancelOrder(id) {
  commit((s) => {
    const o = s.orders.find((x) => x.id === id);
    if (!o) return;
    s.orders = s.orders.filter((x) => x.id !== id);
    notify("chef", `🎒 ${o.camper} cancelled their ${s.meals.find((m) => m.id === o.mealId).name} order.`);
  }).then((ok) => { if (ok) toast("Order cancelled"); });
}

function confirmMealTime(mealId) {
  const slot = $(`#confirm-${mealId}`).value;
  let count = 0, mealName = "";
  commit((s) => {
    const meal = s.meals.find((m) => m.id === mealId);
    if (!meal) return;
    mealName = meal.name;
    const affected = s.orders.filter((o) => o.mealId === mealId && o.status === "pending");
    count = affected.length;
    for (const o of affected) {
      o.status = "confirmed";
      o.confirmedSlot = slot;
      notify(o.camperId || o.camper, `👨‍🍳 Chef confirmed: ${meal.name} will be ready for pickup at ${slot} at the camp kitchen.`);
    }
  }).then((ok) => {
    if (ok) toast(`📣 ${count} camper${count !== 1 ? "s" : ""} notified — ${mealName} at ${slot}`);
  });
}

function setCutoff(value) {
  commit((s) => {
    ensureDayFields(s);
    s.cutoffTime = value;
    s.orderingOverride = null; // a new cutoff clears any manual open/close
  }).then((ok) => {
    if (ok) toast(value ? `⏰ Orders now close at ${cutoffLabel(value)}` : "⏰ Cutoff removed — ordering stays open");
  });
}

function setOrderingOverride(v) {
  commit((s) => {
    ensureDayFields(s);
    s.orderingOverride = v;
  }).then((ok) => {
    if (ok) toast(v === "closed" ? "🔒 Ordering is closed" : "🔓 Ordering is open again");
  });
}

function startNewMorning() {
  if (!confirm("Start a new morning? Today's orders move into history and the board resets for a fresh day.")) return;
  const startedAt = Date.now();
  const newLabel = new Date().toLocaleDateString([], { weekday: "short", month: "short", day: "numeric" });
  let archived = 0;
  commit((s) => {
    ensureDayFields(s);
    // Snapshot orders with meal details so later menu edits can't
    // rewrite history.
    const snaps = s.orders.map((o) => {
      const m = s.meals.find((x) => x.id === o.mealId) || {};
      return { ...o, mealName: m.name || "(removed meal)", mealEmoji: m.emoji || "🍽️", price: m.price || 0 };
    });
    archived = snaps.length;
    if (snaps.length) {
      const served = snaps.filter((o) => o.status === "served");
      s.history.unshift({
        id: uid("h"),
        label: (s.day && s.day.label) || "Earlier",
        archivedAt: nowLabel(),
        orders: snaps,
        servings: served.reduce((a, o) => a + o.qty, 0),
        revenue: served.reduce((a, o) => a + o.qty * (o.price || 0), 0),
      });
      s.history = s.history.slice(0, 30); // keep the log bounded
    }
    s.orders = [];
    s.notifications = [];
    s.orderingOverride = null;
    s.day = { startedAt, label: newLabel };
    notify("all", "🌅 Good morning! The camp kitchen is open — put in your breakfast order.");
  }).then((ok) => {
    if (ok) toast(`🌅 New morning started${archived ? ` — ${archived} order${archived === 1 ? "" : "s"} archived` : ""}`);
  });
}

function markServed(mealId) {
  let count = 0, mealName = "";
  commit((s) => {
    const meal = s.meals.find((m) => m.id === mealId);
    if (!meal) return;
    mealName = meal.name;
    const affected = s.orders.filter((o) => o.mealId === mealId && o.status === "confirmed");
    count = affected.length;
    for (const o of affected) {
      o.status = "served";
      notify(o.camperId || o.camper, `🍽️ Hope you enjoyed the ${meal.name}! Tap “Rate & thank the chef” on your order to rate the meal and send a compliment.`);
    }
  }).then((ok) => {
    if (ok) toast(`🍽️ ${mealName} served — ${count} camper${count !== 1 ? "s" : ""} asked to rate & thank the chef`);
  });
}

    <div class="sub">Rate the meal and send the chef a compliment — it makes their morning.</div>
    <div class="field">
      <label>Your rating</label>
      <div class="star-picker" id="ratePicker">
        ${[1, 2, 3, 4, 5].map((n) => `<button type="button" data-n="${n}" aria-label="${n} star${n > 1 ? "s" : ""}">★</button>`).join("")}
      </div>

function submitReview(orderId) {
  if (!rateStars) return;
  const comment = $("#rateComment").value.trim();
  const stars = rateStars;
  const when = nowLabel();
  commit((s) => {
    const o = s.orders.find((x) => x.id === orderId);
    if (!o) return;
    const m = s.meals.find((x) => x.id === o.mealId);
    o.review = { rating: stars, comment, when };
    notify("chef", `💛 ${o.camper} rated ${m.name} ${"★".repeat(stars)}${comment ? ` — “${comment}”` : ""}`);
  }).then((ok) => {
    if (ok) toast("Thanks! Your rating and compliments were sent to the chef 💛");

// Downscale the chosen image (max 640px wide, JPEG) so it stores
// comfortably in localStorage.
function handlePhotoInput(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const MAX_W = 640;
      const scale = Math.min(1, MAX_W / img.width);
      const canvas = document.createElement("canvas");
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      pendingPhoto = canvas.toDataURL("image/jpeg", 0.78);
      renderPhotoPreview();
    };
    img.onerror = () => toast("That file doesn't look like an image");
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

// Server-side invite sending via the `send-invites` Edge Function
// (Twilio credentials live in Supabase secrets, not in this page).
async function sendInvitesAuto(siteId) {
  const site = directory && directory.sites.find((s) => s.id === siteId);
  if (!site || !session) return;
  if (!(site.phones || []).length && !(site.emails || []).length) return;
  const btn = $("#autoSendBtn");
  if (btn) { btn.disabled = true; btn.textContent = "Sending…"; }
  try {
    const res = await fetch(`${CFG.supabaseUrl.replace(/\/$/, "")}/functions/v1/send-invites`, {
      method: "POST",
      headers: {
        apikey: CFG.supabaseAnonKey,
        Authorization: `Bearer ${session.access_token}`,
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        phones: site.phones || [],
        emails: site.emails || [],
        subject: `🏕️ Welcome to ${site.name}'s camp kitchen`,
        message: inviteMessage(site),
      }),
    });
    if (res.status === 404) {
      toast("🚀 Auto-send isn't set up yet — deploy the send-invites Edge Function (see README) or use the tap-to-text buttons.");
      return;
    }
    const j = await res.json().catch(() => ({}));
    if (!res.ok) {
      toast("⚠️ " + (j.error || `Invites failed to send (${res.status})`));
      return;
    }
    const ok = (j.results || []).filter((r) => r.ok).length;
    const bad = (j.results || []).length - ok;
    toast(bad
      ? `📨 ${ok} invite${ok !== 1 ? "s" : ""} sent, ${bad} failed — check the Twilio logs`
      : `📨 All ${ok} invite${ok !== 1 ? "s" : ""} sent!`);
  } catch (e) {
    toast("⚠️ Couldn't reach the invite sender — check your connection");
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = "🚀 Send to everyone automatically"; }
  }
}

function copyInviteLink(siteId) {
  const link = inviteLink(siteId);
  (navigator.clipboard ? navigator.clipboard.writeText(link) : Promise.reject())
    .then(() => toast("Invite link copied 📋"))
    .catch(() => toast("Copy failed — long-press the link to copy it"));
}

/* -------------------- sign-in screens -------------------------- */
let loginPhone = null;

let loginMethod = "phone"; // "phone" (texted code) or "email" (magic link)

function renderLogin(msg) {
  $("#app").innerHTML = `
    <div class="login-wrap">
      <div class="card">
        <div class="login-emoji">🏕️</div>
        <h2>Sign in to Campfire Kitchen</h2>
        <p class="hint">${msg ? esc(msg) : "Use your cell number or your email — whichever you like."}</p>
        <div class="method-toggle">
          <button type="button" id="methodPhone" class="${loginMethod === "phone" ? "active" : ""}">📱 Phone</button>
          <button type="button" id="methodEmail" class="${loginMethod === "email" ? "active" : ""}">✉️ Email</button>
        </div>
        ${loginMethod === "phone" ? `
        <div class="field">
          <label>Cell phone number</label>
          <input type="tel" id="loginPhone" placeholder="e.g. 555-123-4567" autocomplete="tel" inputmode="tel">
        </div>
        <button class="btn primary" id="sendCodeBtn">Text me a code</button>` : `
        <div class="field">
          <label>Email address</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" inputmode="email">
        </div>
        <button class="btn primary" id="sendLinkBtn">Email me a one-time sign-in link</button>`}
      </div>
    </div>`;
  $("#methodPhone").onclick = () => { loginMethod = "phone"; renderLogin(msg); };
  $("#methodEmail").onclick = () => { loginMethod = "email"; renderLogin(msg); };
  if (loginMethod === "phone") {
    const send = () => onSendCode();
    $("#sendCodeBtn").onclick = send;
    $("#loginPhone").addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });
    $("#loginPhone").focus();
  } else {
    const send = () => onSendLink();
    $("#sendLinkBtn").onclick = send;
    $("#loginEmail").addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });
    $("#loginEmail").focus();
  }
}

function isEmail(s) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s); }

async function onSendLink() {
  const email = $("#loginEmail").value.trim().toLowerCase();
  if (!isEmail(email)) {
    toast("That doesn't look like an email address");
    return;
  }
  const btn = $("#sendLinkBtn");
  btn.disabled = true;
  btn.textContent = "Sending…";
  try {
    await requestMagicLink(email);
    renderLinkSent(email);
  } catch (e) {
    toast("⚠️ " + e.message);
    btn.disabled = false;
    btn.textContent = "Email me a one-time sign-in link";
  }
}

function renderLinkSent(email) {
  $("#app").innerHTML = `
    <div class="login-wrap">
      <div class="card">
        <div class="login-emoji">📬</div>
        <h2>Check your inbox!</h2>
        <p class="hint">We emailed a one-time sign-in link to <strong>${esc(email)}</strong>.<br>
          Open it on this device and you'll land right back here, signed in.</p>
        <div class="row" style="justify-content:center;gap:16px">
          <button class="link-btn" id="resendLinkBtn">Resend link</button>
          <button class="link-btn" id="backToLoginBtn">Use a different email or phone</button>
        </div>
      </div>
    </div>`;
  $("#resendLinkBtn").onclick = async () => {
    try { await requestMagicLink(email); toast("New link sent 📬"); }
    catch (e) { toast("⚠️ " + e.message); }
  };
  $("#backToLoginBtn").onclick = () => renderLogin();
}

async function onSendCode() {
  const phone = normalizePhone($("#loginPhone").value);
  if (phone.replace(/\D/g, "").length < 10) {
    toast("That doesn't look like a full phone number");
    return;
  }
  const btn = $("#sendCodeBtn");
  btn.disabled = true;
  btn.textContent = "Sending…";
  try {
    await requestOtp(phone);
    loginPhone = phone;
    renderCodeEntry();
  } catch (e) {
    toast("⚠️ " + e.message);
    btn.disabled = false;
    btn.textContent = "Text me a code";
  }
}

function renderCodeEntry() {
  $("#app").innerHTML = `
    <div class="login-wrap">
      <div class="card">
        <div class="login-emoji">💬</div>
        <h2>Check your texts</h2>
        <p class="hint">We sent a verification code to <strong>${esc(loginPhone)}</strong>.</p>
        <div class="field">
          <label>Verification code</label>
          <input type="text" id="loginCode" class="code-input" inputmode="numeric" autocomplete="one-time-code" maxlength="10" placeholder="••••••">
        </div>
        <button class="btn primary" id="verifyBtn">Verify &amp; sign in</button>
        <div class="row" style="justify-content:center;gap:16px">
          <button class="link-btn" id="resendBtn">Resend code</button>
          <button class="link-btn" id="changePhoneBtn">Use a different number</button>
        </div>
      </div>
    </div>`;
  const verify = () => onVerifyCode();
  $("#verifyBtn").onclick = verify;
  $("#loginCode").addEventListener("keydown", (e) => { if (e.key === "Enter") verify(); });
  $("#resendBtn").onclick = async () => {
    try { await requestOtp(loginPhone); toast("New code sent 📲"); }
    catch (e) { toast("⚠️ " + e.message); }
  };
  $("#changePhoneBtn").onclick = () => renderLogin();
  $("#loginCode").focus();
}

async function onVerifyCode() {
  const code = $("#loginCode").value.replace(/\D/g, "");
  if (code.length < 4) { toast("Enter the code from the text message"); return; }
  const btn = $("#verifyBtn");
  btn.disabled = true;
  btn.textContent = "Checking…";
  try {
    await verifyOtp(loginPhone, code);
    toast("You're in! 🏕️");
    await startApp();
  } catch (e) {
    toast("⚠️ " + e.message);
    btn.disabled = false;
    btn.textContent = "Verify & sign in";
  }
}

/* --------------------------- startup --------------------------- */
async function startApp() {
  $("#app").innerHTML = `<div class="empty">⛺ Connecting to the camp kitchen…</div>`;
  try {
    await refreshChefStatus();
    await remoteInit();
    setSyncPill("ok");
    render();
  } catch (e) {
    if (e.message === "unauthorized") { handleAuthLoss(); return; }
    setSyncPill("offline");
    $("#app").innerHTML = e.message === "table-missing"
      ? `<div class="empty">🛠️ The shared database isn't set up yet.<br>
          Run <code>supabase-setup.sql</code> in the Supabase project's SQL Editor, then
          <a href="javascript:location.reload()">reload</a>.</div>`
      : `<div class="empty">⚠️ Couldn't reach the camp kitchen server.<br>
          Check your connection (and the Supabase settings in <code>config.js</code>), then
          <a href="javascript:location.reload()">reload</a>.</div>`;
    return;
  }
  startPolling();
}

async function init() {
  setSyncPill("ok");
  if (!REMOTE) {
    directory = seedDirectory();
    prefs.siteId = 1; // device-only demo is single-site
    state = loadLocal();
    render();
    return;
  }
  // Returning from an email magic link (or an email-change
  // confirmation): the session arrives in the URL hash.
  const hash = consumeAuthHash();
  if (hash && hash.error) {
    renderLogin("⚠️ " + hash.error + " — request a fresh link below.");
    return;
  }
  if (hash && hash.tokens) {
    try {
      const u = await fetchAuthUser(hash.tokens.access_token);
      session = {
        access_token: hash.tokens.access_token,
        refresh_token: hash.tokens.refresh_token,
        expires_at: Math.floor(Date.now() / 1000) + hash.tokens.expires_in,
        signedInAt: Date.now(),
        user: { id: u.id, phone: u.phone || null, email: u.email || null },
      };
      saveSession();
      toast("You're in! 🏕️");
    } catch (e) {
      renderLogin("That sign-in link didn't work — request a fresh one.");
      return;
    }
  }
  if (!(await ensureSession())) {
    renderLogin();
    return;
  }
  await startApp();
}

init();
</script>
