name: Deploy Campfire Kitchen to GitHub Pages

# Deploys from master only. (The development branch used to be a
# trigger too, but its runs are rejected by the github-pages
# environment protection and, via the shared concurrency group,
# could cancel the real master deploy.)
on:
  push:
    branches:
      - master
    paths:
      - "camping-food-app/**"
      - ".github/workflows/deploy-camping-app.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload app as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: camping-food-app

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
